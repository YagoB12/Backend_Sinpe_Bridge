trigger:
- main  # Se ejecutará solo cuando hagas push a la rama 'main' (cámbialo si usas master o dev)

# CLAVE: Obliga a Azure a usar tu máquina en lugar de sus servidores
pool:
  name: 'Default'

variables:
  buildConfiguration: 'Release'

steps:
# 1. Restaurar las dependencias y paquetes NuGet del proyecto
- task: DotNetCoreCLI@2
  displayName: 'Restaurar paquetes NuGet (.NET)'
  inputs:
    command: 'restore'
    projects: '**/*.csproj'

# 2. Compilar el Backend en modo Release usando las herramientas de tu compu
- task: DotNetCoreCLI@2
  displayName: 'Compilar Backend (Build)'
  inputs:
    command: 'build'
    projects: '**/*.csproj'
    arguments: '--configuration $(buildConfiguration)'

# 3. Publicar/Empaquetar los archivos listos para ejecutar (el Build/Publish)
- task: DotNetCoreCLI@2
  displayName: 'Generar archivos ejecutables (Publish)'
  inputs:
    command: 'publish'
    publishWebProjects: false
    projects: '**/*.csproj'
    arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)'
    zipAfterPublish: true

# 4. Subir el archivo empaquetado (el artefacto final) a la nube de Azure
- task: PublishBuildArtifacts@1
  displayName: 'Subir artefacto a la nube de Azure'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'sinpe-bridge-backend-build'
    publishLocation: 'Container'